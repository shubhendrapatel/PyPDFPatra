[pytest]
# PyPDFPatra pytest configuration

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
# Coverage options
[coverage:run]
branch = True
source = src/pypdfpatra

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
sort = Cover

[coverage:html]
directory = htmlcov
